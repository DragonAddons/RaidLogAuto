name: Release

on:
    push:
        tags:
            - "*"
    workflow_dispatch:
        inputs:
            tag_name:
                description: Tag to release
                required: true

permissions:
    contents: write

jobs:
    release:
        uses: DragonAddons/wow-workflows/.github/workflows/release.yml@main
        with:
            tag_name: ${{ inputs.tag_name || github.ref_name }}
        secrets: inherit
